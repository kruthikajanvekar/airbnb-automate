<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Airbnb Automate{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">🏠 Airbnb Automate</a>
        </div>
        <div class="nav-actions">
            <form method="POST" action="/login/airbnb" class="nav-login-form">
                <button type="submit" class="btn btn-sm btn-login" id="login-btn">
                    🔐 Login to Airbnb
                </button>
            </form>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="alerts">
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Airbnb Automate — Find your next stay</p>
    </footer>
</body>
</html>
